baseURL: https://www.barkertrax.com/
languageCode: en-gb
title: 'Mark Barton'
theme: 'PaperMod'

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  author: "Mark Barton"
  description: "Audio technology, electronics, and ongoing projects..."

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  firstEntryAsLatest: false
  disableSpecial1stPost: true
  ShowLastMod: true
  enableGitInfo: true

  mainSections:
    - notes
    - projects
    - articles
    - links

  socialIcons:
    - name: instagram
      url: "https://www.instagram.com/barkertrax/"
    - name: linkedin
      url: "https://www.linkedin.com/in/mark-barton-b4282016/"
    - name: github
      url: "https://github.com/barkertrax"

menu:
  main:
    - identifier: notes
      name: Notes
      url: /notes/
      weight: 10

    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20

    - identifier: articles
      name: Articles
      url: /articles/
      weight: 30

    - identifier: bookmarks
      name: Bookmarks
      url: /bookmarks/
      weight: 40

    - identifier: about
      name: About
      url: /about/
      weight: 50

taxonomies:
  tag: tags
  category: categories

outputs:
  home:
    - HTML
    - RSS
    - JSON

frontmatter:
  lastmod:
    - :git
    - lastmod
    - modified
    - date
    - publishDate